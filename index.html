<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORIPA.P2P - オンラインオリパ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .bg-shimmer {
            background: linear-gradient(45deg, transparent 25%, rgba(250, 204, 21, 0.1) 50%, transparent 75%);
            background-size: 250% 250%;
            animation: shimmer 2s infinite linear;
        }

        @keyframes shimmer {
            0% { background-position: -200% -200%; }
            100% { background-position: 200% 200%; }
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Fullscreen時にアスペクト比を維持 */
            background: black;
        }

        .toast {
            transform: translateX(-50%) translateY(100px);
            transition: transform 0.3s ease;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #FACC15; border-radius: 10px; }
    </style>
</head>
<body class="fixed inset-0 flex flex-col">

    <!-- Header -->
    <header class="px-6 py-4 flex justify-between items-center z-20 border-b border-yellow-500/20 bg-black">
        <div class="flex items-center gap-2">
            <div class="bg-yellow-400 p-1 rounded-sm">
                <i class="fas fa-bolt text-black text-lg"></i>
            </div>
            <h1 class="text-xl font-black italic tracking-tighter text-yellow-400">ORIPA.P2P</h1>
        </div>
        <div class="flex gap-2">
            <button id="btn-share" class="hidden bg-yellow-400 text-black px-4 py-1.5 rounded-full text-[11px] font-black flex items-center gap-1 active:scale-95 transition-transform">
                <i class="fas fa-share-alt"></i> 招待リンク
            </button>
            <button id="btn-settings" class="p-2 border border-yellow-500/30 rounded-full text-yellow-400 active:bg-yellow-400/10">
                <i class="fas fa-cog"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 relative flex flex-col items-center justify-center p-6 overflow-y-auto pb-32">
        
        <!-- Status -->
        <div class="absolute top-6 flex items-center gap-2 bg-yellow-400/10 border border-yellow-400/20 px-4 py-1.5 rounded-full z-10">
            <div id="status-dot" class="w-1.5 h-1.5 rounded-full bg-red-500"></div>
            <span id="status-text" class="text-[10px] font-bold tracking-widest uppercase text-yellow-400/80">初期化中...</span>
        </div>

        <!-- Setup Form -->
        <div id="setup-view" class="w-full max-w-sm bg-zinc-900/50 border border-yellow-500/20 rounded-3xl p-6 hidden">
            <div class="flex items-center gap-3 mb-6">
                <i class="fas fa-edit text-yellow-400 text-xl"></i>
                <h2 class="text-lg font-black text-yellow-400">オリパ作成パネル</h2>
            </div>
            
            <div class="space-y-4 max-h-[60vh] overflow-y-auto pr-2">
                <div>
                    <label class="text-[10px] font-bold text-zinc-500 uppercase block mb-1">オリパ名</label>
                    <input id="input-title" type="text" value="究極の2択オリパ" class="w-full bg-black border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:border-yellow-400 outline-none">
                </div>
                
                <div>
                    <label class="text-[10px] font-bold text-zinc-500 uppercase block mb-1">サムネイル画像</label>
                    <label class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-xs flex items-center justify-center gap-2 cursor-pointer active:bg-zinc-700">
                        <i class="fas fa-image"></i> <span id="image-label">画像を選択</span>
                        <input id="input-image" type="file" accept="image/*" class="hidden">
                    </label>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-black/40 p-3 rounded-xl border border-green-500/20">
                        <label class="text-[10px] font-bold text-green-500 uppercase block mb-1">当たりの数</label>
                        <input id="input-win-count" type="number" value="1" min="0" class="w-full bg-transparent text-xl font-bold outline-none text-white">
                    </div>
                    <div class="bg-black/40 p-3 rounded-xl border border-red-500/20">
                        <label class="text-[10px] font-bold text-red-500 uppercase block mb-1">ハズレの数</label>
                        <input id="input-lose-count" type="number" value="9" min="0" class="w-full bg-transparent text-xl font-bold outline-none text-white">
                    </div>
                </div>
            </div>
            
            <button id="btn-start" class="w-full bg-yellow-400 text-black font-black py-4 rounded-xl mt-6 active:scale-95 transition-transform shadow-lg shadow-yellow-400/20">
                この設定で公開する
            </button>
        </div>

        <!-- Waiting View -->
        <div id="waiting-view" class="text-center space-y-4 hidden">
            <div class="w-16 h-16 border-4 border-yellow-400/20 border-t-yellow-400 rounded-full animate-spin mx-auto"></div>
            <p class="text-yellow-400 font-bold animate-pulse uppercase tracking-widest text-xs">ホストの準備を待機中...</p>
        </div>

        <!-- Game View -->
        <div id="game-view" class="w-full flex flex-col items-center hidden">
            <div class="w-full max-w-[320px] mb-6 flex flex-col items-center">
                <div id="display-thumb-container" class="w-full aspect-video bg-zinc-900 rounded-2xl overflow-hidden border border-yellow-500/20 mb-4 hidden">
                    <img id="display-thumb" src="" class="w-full h-full object-cover">
                </div>
                <h2 id="display-title" class="text-2xl font-black text-yellow-400 italic uppercase tracking-tighter text-center">TITLE</h2>
            </div>

            <div class="w-full max-w-[300px] aspect-[3/4] relative">
                <div id="card-aura" class="absolute -inset-6 rounded-[3rem] blur-3xl opacity-0 transition-all duration-1000"></div>
                <div id="card-display" class="w-full h-full rounded-[2.5rem] bg-zinc-900 border-2 border-zinc-800 flex flex-col items-center justify-center text-zinc-700 transition-all shadow-2xl">
                    <div id="card-idle" class="flex flex-col items-center">
                        <div class="w-20 h-20 bg-yellow-400 rounded-full flex items-center justify-center mb-6 shadow-lg shadow-yellow-400/20 animate-bounce">
                            <i class="fas fa-gift text-black text-3xl"></i>
                        </div>
                        <p class="font-black text-sm tracking-[0.3em] uppercase text-zinc-500">Ready to Open</p>
                    </div>
                    <div id="card-spinning" class="hidden w-full h-full rounded-[2.5rem] border-4 border-yellow-400 bg-shimmer flex items-center justify-center">
                        <div class="text-center">
                            <i class="fas fa-circle-notch text-yellow-400 text-5xl animate-spin mb-4"></i>
                            <p class="text-yellow-400 font-black text-xs tracking-widest">抽選中...</p>
                        </div>
                    </div>
                    <div id="card-result" class="hidden w-full h-full rounded-[2.5rem] overflow-hidden bg-black video-container relative">
                        <div id="video-error-ui" class="absolute inset-0 flex items-center justify-center text-zinc-800 hidden">
                             <i class="fas fa-video-slash text-4xl"></i>
                        </div>
                        <video id="result-video" playsinline muted>
                            <!-- Video Source -->
                        </video>
                        <div id="result-overlay" class="absolute inset-0 bg-black/60 flex flex-col items-center justify-center opacity-0 transition-opacity duration-500 pointer-events-none">
                             <h3 id="result-text" class="text-4xl font-black italic tracking-tighter uppercase mb-2">RESULT</h3>
                             <p class="text-white/60 text-[10px] font-bold tracking-widest uppercase text-center">フルスクリーンを解除して戻ります</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer id="controls" class="p-6 pb-12 bg-black border-t border-yellow-500/10 hidden z-30">
        <div class="max-w-md mx-auto space-y-6">
            <div class="flex justify-between items-end">
                <div>
                    <p class="text-[10px] font-black text-zinc-600 uppercase tracking-widest mb-1">残り口数</p>
                    <p class="text-2xl font-black text-white"><span id="deck-count">0</span> <span class="text-sm text-zinc-500">/ <span id="total-count">0</span></span></p>
                </div>
                <div id="deck-progress" class="flex gap-1"></div>
            </div>
            <div id="host-actions" class="hidden flex gap-3">
                <button id="btn-reset" class="w-16 h-16 bg-zinc-900 rounded-2xl flex items-center justify-center border border-zinc-800 active:scale-90 transition-transform">
                    <i class="fas fa-undo text-zinc-500"></i>
                </button>
                <button id="btn-pull" class="flex-1 bg-yellow-400 text-black rounded-2xl font-black text-xl flex items-center justify-center gap-3 active:scale-[0.98] transition-all shadow-xl shadow-yellow-400/20 disabled:opacity-20">
                    <i class="fas fa-bolt"></i>
                    開封する
                </button>
            </div>
            <div id="guest-waiting-msg" class="hidden w-full bg-zinc-900 border border-zinc-800 rounded-2xl py-5 text-center text-zinc-500 italic font-bold">
                <i class="fas fa-hourglass-half mr-2 animate-pulse"></i> ホストの操作を待機中...
            </div>
        </div>
    </footer>

    <!-- Settings Overlay -->
    <div id="settings-overlay" class="fixed inset-0 z-50 bg-black/95 backdrop-blur-sm hidden flex flex-col">
        <div class="flex justify-between items-center p-6 border-b border-white/5">
            <h2 class="text-xl font-black text-yellow-400 tracking-tighter italic uppercase">Network Settings</h2>
            <button id="btn-close-settings" class="p-2 bg-zinc-900 rounded-full"><i class="fas fa-times text-xl"></i></button>
        </div>
        <div class="p-6">
            <label class="text-[10px] font-black text-zinc-600 uppercase tracking-[0.2em] mb-3 block">My Peer ID</label>
            <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-2xl">
                <span id="my-id-display" class="text-xs font-mono text-yellow-400 break-all select-all">---</span>
            </div>
        </div>
    </div>

    <div id="toast" class="toast fixed bottom-10 left-1/2 bg-yellow-400 text-black px-8 py-3 rounded-full font-black text-sm z-[100] shadow-2xl">リンクをコピーしました</div>

    <script>
        let peer, conn, myId = '', role = null, isStarted = false, deck = [];
        let hostConfig = { title: '', count: 0, imageData: '', winCount: 0, loseCount: 0 };

        const els = {
            statusText: document.getElementById('status-text'),
            statusDot: document.getElementById('status-dot'),
            setupView: document.getElementById('setup-view'),
            waitingView: document.getElementById('waiting-view'),
            gameView: document.getElementById('game-view'),
            controls: document.getElementById('controls'),
            hostActions: document.getElementById('host-actions'),
            guestMsg: document.getElementById('guest-waiting-msg'),
            btnShare: document.getElementById('btn-share'),
            btnStart: document.getElementById('btn-start'),
            btnPull: document.getElementById('btn-pull'),
            btnReset: document.getElementById('btn-reset'),
            deckCount: document.getElementById('deck-count'),
            totalCount: document.getElementById('total-count'),
            deckProgress: document.getElementById('deck-progress'),
            cardIdle: document.getElementById('card-idle'),
            cardSpinning: document.getElementById('card-spinning'),
            cardResult: document.getElementById('card-result'),
            cardAura: document.getElementById('card-aura'),
            resultVideo: document.getElementById('result-video'),
            resultOverlay: document.getElementById('result-overlay'),
            resultText: document.getElementById('result-text'),
            displayTitle: document.getElementById('display-title'),
            displayThumb: document.getElementById('display-thumb'),
            displayThumbContainer: document.getElementById('display-thumb-container'),
            myIdDisplay: document.getElementById('my-id-display'),
            inputImage: document.getElementById('input-image'),
            imageLabel: document.getElementById('image-label'),
            videoErrorUi: document.getElementById('video-error-ui')
        };

        function initPeer() {
            peer = new Peer();
            peer.on('open', (id) => {
                myId = id;
                els.myIdDisplay.innerText = id;
                els.btnShare.classList.remove('hidden');
                const hostId = new URLSearchParams(window.location.search).get('host');
                if (hostId && hostId !== id) connectToHost(hostId);
                else { role = 'host'; els.setupView.classList.remove('hidden'); }
            });
            peer.on('connection', (c) => { 
                conn = c; role = 'host'; setupConnection(); 
                if (isStarted) sendData({ type: 'SYNC_ALL', config: hostConfig, isStarted, deck });
                else sendData({ type: 'SYNC_CONFIG', config: hostConfig });
            });
        }

        function connectToHost(id) {
            role = 'guest'; conn = peer.connect(id);
            setupConnection();
            els.waitingView.classList.remove('hidden');
        }

        function setupConnection() {
            conn.on('open', () => { els.statusDot.className = 'w-1.5 h-1.5 rounded-full bg-green-500'; });
            conn.on('data', (data) => handleData(data));
        }

        function handleData(data) {
            switch(data.type) {
                case 'SYNC_CONFIG': hostConfig = data.config; updateUIFromConfig(); break;
                case 'SYNC_ALL': hostConfig = data.config; isStarted = data.isStarted; deck = data.deck; updateUIFromConfig(); if (isStarted) showGame(); updateDeckUI(); break;
                case 'GAME_START': isStarted = true; deck = data.deck; hostConfig = data.config; showGame(); updateDeckUI(); break;
                case 'START_SPIN': showSpinning(); break;
                case 'RESULT': showResult(data.card, data.newDeck); break;
                case 'RESET': location.reload(); break;
            }
        }

        function sendData(d) { if (conn && conn.open) conn.send(d); }

        function updateUIFromConfig() {
            els.displayTitle.innerText = hostConfig.title || 'オリパ';
            if (hostConfig.imageData) { els.displayThumb.src = hostConfig.imageData; els.displayThumbContainer.classList.remove('hidden'); }
        }

        function showGame() {
            els.setupView.classList.add('hidden'); els.waitingView.classList.add('hidden');
            els.gameView.classList.remove('hidden'); els.controls.classList.remove('hidden');
            if (role === 'host') els.hostActions.classList.remove('hidden');
            else els.guestMsg.classList.remove('hidden');
        }

        function updateDeckUI() {
            els.deckCount.innerText = deck.length; els.totalCount.innerText = hostConfig.count;
            els.deckProgress.innerHTML = '';
            const maxDots = 5;
            const filled = Math.ceil((deck.length / hostConfig.count) * maxDots);
            for(let i=0; i<maxDots; i++) {
                const dot = document.createElement('div');
                dot.className = `w-8 h-1 rounded-full ${i < filled ? 'bg-yellow-400' : 'bg-zinc-800'}`;
                els.deckProgress.appendChild(dot);
            }
        }

        function showSpinning() {
            els.cardIdle.classList.add('hidden'); els.cardResult.classList.add('hidden');
            els.cardSpinning.classList.remove('hidden');
            els.resultOverlay.classList.add('opacity-0');
            els.videoErrorUi.classList.add('hidden');
        }

        async function showResult(card, newDeck) {
            deck = newDeck;
            els.cardSpinning.classList.add('hidden');
            els.cardResult.classList.remove('hidden');
            
            const videoSrc = card.win ? '1.mp4' : '2.mp4';
            
            if (card.win) {
                els.cardAura.className = "absolute -inset-6 rounded-[3rem] blur-3xl transition-all duration-1000 bg-yellow-400 opacity-60 animate-pulse";
                els.resultText.innerText = "WIN!!"; els.resultText.className = "text-4xl font-black italic tracking-tighter uppercase mb-2 text-yellow-400";
            } else {
                els.cardAura.className = "absolute -inset-6 rounded-[3rem] blur-3xl transition-all duration-1000 bg-red-600 opacity-20";
                els.resultText.innerText = "LOSE"; els.resultText.className = "text-4xl font-black italic tracking-tighter uppercase mb-2 text-zinc-400";
            }

            try {
                els.resultVideo.pause();
                els.resultVideo.removeAttribute('src');
                els.resultVideo.load();
                els.resultVideo.src = videoSrc;
                
                // フルスクリーンのリクエスト
                if (els.resultVideo.requestFullscreen) {
                    await els.resultVideo.requestFullscreen().catch(err => console.log("Fullscreen request denied"));
                } else if (els.resultVideo.webkitRequestFullscreen) {
                    await els.resultVideo.webkitRequestFullscreen();
                }

                await els.resultVideo.play().catch(e => {
                    els.videoErrorUi.classList.remove('hidden');
                    els.resultOverlay.classList.remove('opacity-0');
                    if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
                });

                els.resultVideo.onended = () => {
                    els.resultOverlay.classList.remove('opacity-0');
                    if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
                };
            } catch (err) {
                els.videoErrorUi.classList.remove('hidden');
                els.resultOverlay.classList.remove('opacity-0');
            }

            updateDeckUI();
            if (deck.length === 0) els.btnPull.disabled = true;
        }

        els.btnStart.addEventListener('click', () => {
            if (role !== 'host') return;
            const win = parseInt(document.getElementById('input-win-count').value) || 0;
            const lose = parseInt(document.getElementById('input-lose-count').value) || 0;
            hostConfig.title = document.getElementById('input-title').value;
            hostConfig.winCount = win; hostConfig.loseCount = lose; hostConfig.count = win + lose;
            if (hostConfig.count === 0) return alert('パックを1つ以上追加してください');
            deck = [];
            for(let i=0; i<win; i++) deck.push({ win: true });
            for(let i=0; i<lose; i++) deck.push({ win: false });
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            isStarted = true; showGame(); updateDeckUI();
            sendData({ type: 'GAME_START', deck, config: hostConfig });
        });

        els.btnPull.addEventListener('click', () => {
            if (role !== 'host' || deck.length === 0) return;
            showSpinning(); sendData({ type: 'START_SPIN' });
            setTimeout(() => {
                const card = deck.pop();
                showResult(card, deck);
                sendData({ type: 'RESULT', card, newDeck: deck });
            }, 2000);
        });

        els.btnReset.addEventListener('click', () => {
            if (confirm('最初から作り直しますか？')) { sendData({ type: 'RESET' }); location.reload(); }
        });

        els.inputImage.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                hostConfig.imageData = ev.target.result;
                els.imageLabel.innerText = '画像を選択済み';
                updateUIFromConfig();
                sendData({ type: 'SYNC_CONFIG', config: hostConfig });
            };
            reader.readAsDataURL(file);
        });

        els.btnShare.addEventListener('click', () => {
            const url = `${window.location.origin}${window.location.pathname}?host=${myId}`;
            const t = document.createElement("textarea"); t.value = url; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
            const toast = document.getElementById('toast'); toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        });

        document.getElementById('btn-settings').addEventListener('click', () => document.getElementById('settings-overlay').classList.remove('hidden'));
        document.getElementById('btn-close-settings').addEventListener('click', () => document.getElementById('settings-overlay').classList.add('hidden'));

        initPeer();
    </script>
</body>
</html>
