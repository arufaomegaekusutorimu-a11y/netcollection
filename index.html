<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORIPA.P2P - オンラインオリパ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .bg-shimmer {
            background: linear-gradient(45deg, transparent 25%, rgba(250, 204, 21, 0.1) 50%, transparent 75%);
            background-size: 250% 250%;
            animation: shimmer 2s infinite linear;
        }

        @keyframes shimmer { 0% { background-position: -200% -200%; } 100% { background-position: 200% 200%; } }

        /* 動画を画面いっぱいに表示（コントロール非表示） */
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: black;
            pointer-events: none; /* クリックで再生バーが出ないようにする */
        }

        .toast { transform: translateX(-50%) translateY(100px); transition: transform 0.3s ease; }
        .toast.show { transform: translateX(-50%) translateY(0); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #FACC15; border-radius: 10px; }
    </style>
</head>
<body class="fixed inset-0 flex flex-col">

    <!-- Header -->
    <header class="px-6 py-4 flex justify-between items-center z-20 border-b border-yellow-500/20 bg-black">
        <div class="flex items-center gap-2">
            <div class="bg-yellow-400 p-1 rounded-sm">
                <i class="fas fa-bolt text-black text-lg"></i>
            </div>
            <h1 class="text-xl font-black italic tracking-tighter text-yellow-400">ORIPA.P2P</h1>
        </div>
        <div class="flex gap-2">
            <button id="btn-share" class="hidden bg-yellow-400 text-black px-4 py-1.5 rounded-full text-[11px] font-black flex items-center gap-1 active:scale-95 transition-transform">
                <i class="fas fa-share-alt"></i> 招待リンク
            </button>
            <button id="btn-settings" class="p-2 border border-yellow-500/30 rounded-full text-yellow-400 active:bg-yellow-400/10">
                <i class="fas fa-cog"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 relative flex flex-col items-center justify-center p-6 overflow-y-auto pb-32">
        
        <!-- Status -->
        <div class="absolute top-6 flex items-center gap-2 bg-yellow-400/10 border border-yellow-400/20 px-4 py-1.5 rounded-full z-10">
            <div id="status-dot" class="w-1.5 h-1.5 rounded-full bg-red-500"></div>
            <span id="status-text" class="text-[10px] font-bold tracking-widest uppercase text-yellow-400/80">初期化中...</span>
        </div>

        <!-- Setup Form (Host Only) -->
        <div id="setup-view" class="w-full max-w-sm bg-zinc-900/50 border border-yellow-500/20 rounded-3xl p-6 hidden">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-3">
                    <i class="fas fa-edit text-yellow-400 text-xl"></i>
                    <h2 class="text-lg font-black text-yellow-400">オリパ作成</h2>
                </div>
                <button id="btn-show-list" class="text-[10px] font-bold text-zinc-400 underline">作成済み一覧</button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-zinc-500 uppercase block mb-1">オリパ名</label>
                    <input id="input-title" type="text" placeholder="例: 爆アド2択オリパ" class="w-full bg-black border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:border-yellow-400 outline-none">
                </div>
                
                <div>
                    <label class="text-[10px] font-bold text-zinc-500 uppercase block mb-1">サムネイル</label>
                    <label class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-xs flex items-center justify-center gap-2 cursor-pointer active:bg-zinc-700">
                        <i class="fas fa-image"></i> <span id="image-label">画像を選択</span>
                        <input id="input-image" type="file" accept="image/*" class="hidden">
                    </label>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-black/40 p-3 rounded-xl border border-green-500/20">
                        <label class="text-[10px] font-bold text-green-500 uppercase block mb-1">当たり数</label>
                        <input id="input-win-count" type="number" value="1" min="0" class="w-full bg-transparent text-xl font-bold outline-none text-white">
                    </div>
                    <div class="bg-black/40 p-3 rounded-xl border border-red-500/20">
                        <label class="text-[10px] font-bold text-red-500 uppercase block mb-1">ハズレ数</label>
                        <input id="input-lose-count" type="number" value="9" min="0" class="w-full bg-transparent text-xl font-bold outline-none text-white">
                    </div>
                </div>
            </div>
            
            <button id="btn-add-oripa" class="w-full bg-yellow-400 text-black font-black py-4 rounded-xl mt-6 active:scale-95 transition-transform shadow-lg shadow-yellow-400/20">
                オリパを公開する
            </button>
        </div>

        <!-- Created Oripas List (Host/Guest) -->
        <div id="oripa-list-view" class="w-full max-w-sm space-y-4 hidden">
            <h2 class="text-xl font-black text-yellow-400 italic mb-4 flex items-center gap-2">
                <i class="fas fa-layer-group"></i> 公開中のオリパ
            </h2>
            <div id="oripa-items-container" class="space-y-3">
                <!-- Items injected here -->
            </div>
            <button id="btn-back-to-setup" class="hidden w-full py-3 text-zinc-500 text-xs font-bold border border-zinc-800 rounded-xl">
                新規作成に戻る
            </button>
        </div>

        <!-- Game View -->
        <div id="game-view" class="w-full flex flex-col items-center hidden">
            <button id="btn-leave-game" class="mb-4 text-zinc-500 text-xs font-bold flex items-center gap-1">
                <i class="fas fa-chevron-left"></i> 一覧に戻る
            </button>

            <div class="w-full max-w-[320px] mb-6 flex flex-col items-center">
                <div id="display-thumb-container" class="w-full aspect-video bg-zinc-900 rounded-2xl overflow-hidden border border-yellow-500/20 mb-4 hidden">
                    <img id="display-thumb" src="" class="w-full h-full object-cover">
                </div>
                <h2 id="display-title" class="text-2xl font-black text-yellow-400 italic uppercase tracking-tighter text-center">TITLE</h2>
            </div>

            <div id="card-stage" class="w-full max-w-[300px] aspect-[3/4] relative">
                <div id="card-aura" class="absolute -inset-6 rounded-[3rem] blur-3xl opacity-0 transition-all duration-1000"></div>
                <div id="card-display" class="w-full h-full rounded-[2.5rem] bg-zinc-900 border-2 border-zinc-800 flex flex-col items-center justify-center text-zinc-700 transition-all shadow-2xl relative overflow-hidden">
                    
                    <!-- Idle state -->
                    <div id="card-idle" class="flex flex-col items-center">
                        <div class="w-20 h-20 bg-yellow-400 rounded-full flex items-center justify-center mb-6 shadow-lg shadow-yellow-400/20 animate-bounce">
                            <i class="fas fa-gift text-black text-3xl"></i>
                        </div>
                        <p class="font-black text-sm tracking-[0.3em] uppercase text-zinc-500">Ready to Open</p>
                    </div>

                    <!-- Spinning state -->
                    <div id="card-spinning" class="hidden w-full h-full rounded-[2.5rem] border-4 border-yellow-400 bg-shimmer flex items-center justify-center">
                        <div class="text-center">
                            <i class="fas fa-circle-notch text-yellow-400 text-5xl animate-spin mb-4"></i>
                            <p class="text-yellow-400 font-black text-xs tracking-widest">抽選中...</p>
                        </div>
                    </div>

                    <!-- Video Result (Controls removed) -->
                    <div id="card-result" class="hidden absolute inset-0 bg-black video-container">
                        <video id="result-video" playsinline muted disablePictureInPicture disableremoteplayback>
                            <!-- Video Source -->
                        </video>
                        <div id="result-overlay" class="absolute inset-0 bg-black/70 flex flex-col items-center justify-center opacity-0 transition-opacity duration-500 pointer-events-none">
                             <h3 id="result-text" class="text-4xl font-black italic tracking-tighter uppercase mb-2">RESULT</h3>
                             <p class="text-white/60 text-[10px] font-bold tracking-widest uppercase">Tap to close</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer (Only for Guests in Game or Host globally) -->
    <footer id="controls" class="p-6 pb-12 bg-black border-t border-yellow-500/10 hidden z-30">
        <div class="max-w-md mx-auto space-y-6">
            <div class="flex justify-between items-end">
                <div>
                    <p class="text-[10px] font-black text-zinc-600 uppercase tracking-widest mb-1">残り口数</p>
                    <p class="text-2xl font-black text-white"><span id="deck-count">0</span> <span class="text-sm text-zinc-500">/ <span id="total-count">0</span></span></p>
                </div>
                <div id="deck-progress" class="flex gap-1"></div>
            </div>

            <!-- Guest Action -->
            <button id="btn-pull" class="hidden w-full bg-yellow-400 text-black rounded-2xl font-black text-xl py-5 flex items-center justify-center gap-3 active:scale-[0.98] transition-all shadow-xl shadow-yellow-400/20 disabled:opacity-20">
                <i class="fas fa-bolt"></i> 開封する
            </button>
            
            <!-- Host Reset (Visible in Game) -->
            <button id="btn-reset" class="hidden w-full bg-red-600/10 text-red-500 border border-red-500/20 rounded-2xl py-3 font-bold text-xs active:bg-red-600/20">
                このオリパを完売/削除する
            </button>
        </div>
    </footer>

    <!-- Settings -->
    <div id="settings-overlay" class="fixed inset-0 z-50 bg-black/95 backdrop-blur-sm hidden flex flex-col">
        <div class="flex justify-between items-center p-6 border-b border-white/5">
            <h2 class="text-xl font-black text-yellow-400 tracking-tighter italic uppercase">Network Settings</h2>
            <button id="btn-close-settings" class="p-2 bg-zinc-900 rounded-full"><i class="fas fa-times text-xl"></i></button>
        </div>
        <div class="p-6">
            <label class="text-[10px] font-black text-zinc-600 uppercase tracking-[0.2em] mb-3 block">My Peer ID</label>
            <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-2xl">
                <span id="my-id-display" class="text-xs font-mono text-yellow-400 break-all select-all">---</span>
            </div>
        </div>
    </div>

    <div id="toast" class="toast fixed bottom-10 left-1/2 bg-yellow-400 text-black px-8 py-3 rounded-full font-black text-sm z-[100] shadow-2xl">リンクをコピーしました</div>

    <script>
        let peer, conn, myId = '', role = null;
        let oripas = []; // { id, title, imageData, winCount, loseCount, deck, total }
        let currentOripaId = null;

        const els = {
            statusText: document.getElementById('status-text'),
            statusDot: document.getElementById('status-dot'),
            setupView: document.getElementById('setup-view'),
            oripaListView: document.getElementById('oripa-list-view'),
            oripaContainer: document.getElementById('oripa-items-container'),
            gameView: document.getElementById('game-view'),
            controls: document.getElementById('controls'),
            btnPull: document.getElementById('btn-pull'),
            btnReset: document.getElementById('btn-reset'),
            btnShowList: document.getElementById('btn-show-list'),
            btnBackSetup: document.getElementById('btn-back-to-setup'),
            btnLeaveGame: document.getElementById('btn-leave-game'),
            deckCount: document.getElementById('deck-count'),
            totalCount: document.getElementById('total-count'),
            deckProgress: document.getElementById('deck-progress'),
            cardIdle: document.getElementById('card-idle'),
            cardSpinning: document.getElementById('card-spinning'),
            cardResult: document.getElementById('card-result'),
            cardAura: document.getElementById('card-aura'),
            resultVideo: document.getElementById('result-video'),
            resultOverlay: document.getElementById('result-overlay'),
            resultText: document.getElementById('result-text'),
            displayTitle: document.getElementById('display-title'),
            displayThumb: document.getElementById('display-thumb'),
            displayThumbContainer: document.getElementById('display-thumb-container'),
            myIdDisplay: document.getElementById('my-id-display'),
            inputImage: document.getElementById('input-image'),
            imageLabel: document.getElementById('image-label')
        };

        function initPeer() {
            peer = new Peer();
            peer.on('open', (id) => {
                myId = id;
                els.myIdDisplay.innerText = id;
                document.getElementById('btn-share').classList.remove('hidden');
                const hostId = new URLSearchParams(window.location.search).get('host');
                if (hostId && hostId !== id) connectToHost(hostId);
                else { 
                    role = 'host'; 
                    els.setupView.classList.remove('hidden'); 
                    els.btnBackSetup.classList.remove('hidden');
                }
            });
            peer.on('connection', (c) => { 
                conn = c; role = 'host'; setupConnection(); 
                sendData({ type: 'SYNC_LIST', oripas });
            });
        }

        function connectToHost(id) {
            role = 'guest'; conn = peer.connect(id);
            setupConnection();
            els.statusText.innerText = 'ホストに接続中...';
        }

        function setupConnection() {
            conn.on('open', () => { 
                els.statusDot.className = 'w-1.5 h-1.5 rounded-full bg-green-500';
                if(role === 'guest') els.statusText.innerText = '接続完了';
            });
            conn.on('data', (data) => handleData(data));
        }

        function handleData(data) {
            switch(data.type) {
                case 'SYNC_LIST':
                    oripas = data.oripas;
                    if (!currentOripaId) showListView();
                    else updateOripaInGame();
                    break;
                case 'START_SPIN':
                    if (data.oripaId === currentOripaId) showSpinningUI();
                    break;
                case 'RESULT':
                    if (data.oripaId === currentOripaId) showResultUI(data.card, data.newDeck);
                    break;
                case 'ORIPA_REMOVED':
                    oripas = oripas.filter(o => o.id !== data.oripaId);
                    if (currentOripaId === data.oripaId) {
                        alert('このオリパは終了しました');
                        showListView();
                    } else {
                        renderOripaList();
                    }
                    break;
            }
        }

        function sendData(d) { if (conn && conn.open) conn.send(d); }

        // --- View Management ---

        function showListView() {
            currentOripaId = null;
            els.setupView.classList.add('hidden');
            els.gameView.classList.add('hidden');
            els.controls.classList.add('hidden');
            els.oripaListView.classList.remove('hidden');
            renderOripaList();
        }

        function renderOripaList() {
            els.oripaContainer.innerHTML = '';
            if (oripas.length === 0) {
                els.oripaContainer.innerHTML = '<p class="text-zinc-600 text-center py-10 font-bold italic">公開中のオリパはありません</p>';
                return;
            }
            oripas.forEach(o => {
                const item = document.createElement('div');
                item.className = "bg-zinc-900 border border-zinc-800 p-4 rounded-2xl flex items-center gap-4 active:scale-[0.98] transition-transform cursor-pointer";
                item.innerHTML = `
                    <div class="w-16 h-16 bg-zinc-800 rounded-xl overflow-hidden flex-shrink-0">
                        ${o.imageData ? `<img src="${o.imageData}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-zinc-600"><i class="fas fa-image"></i></div>`}
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="font-black text-white truncate">${o.title}</h3>
                        <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mt-1">残り ${o.deck.length} / ${o.total} 口</p>
                    </div>
                    <i class="fas fa-chevron-right text-yellow-400/50"></i>
                `;
                item.onclick = () => enterGame(o.id);
                els.oripaContainer.appendChild(item);
            });
        }

        function enterGame(id) {
            currentOripaId = id;
            updateOripaInGame();
            els.oripaListView.classList.add('hidden');
            els.setupView.classList.add('hidden');
            els.gameView.classList.remove('hidden');
            els.controls.classList.remove('hidden');
            
            // ホストはリセットのみ、ゲストは開封のみ
            if (role === 'host') {
                els.btnPull.classList.add('hidden');
                els.btnReset.classList.remove('hidden');
            } else {
                els.btnPull.classList.remove('hidden');
                els.btnReset.classList.add('hidden');
            }
            
            // UIリセット
            els.cardIdle.classList.remove('hidden');
            els.cardSpinning.classList.add('hidden');
            els.cardResult.classList.add('hidden');
            els.cardAura.className = "absolute -inset-6 rounded-[3rem] blur-3xl opacity-0 transition-all duration-1000";
        }

        function updateOripaInGame() {
            const o = oripas.find(item => item.id === currentOripaId);
            if (!o) return;
            els.displayTitle.innerText = o.title;
            if (o.imageData) {
                els.displayThumb.src = o.imageData;
                els.displayThumbContainer.classList.remove('hidden');
            } else {
                els.displayThumbContainer.classList.add('hidden');
            }
            els.deckCount.innerText = o.deck.length;
            els.totalCount.innerText = o.total;
            
            // Progress dots
            els.deckProgress.innerHTML = '';
            const maxDots = 5;
            const filled = Math.ceil((o.deck.length / o.total) * maxDots);
            for(let i=0; i<maxDots; i++) {
                const dot = document.createElement('div');
                dot.className = `w-8 h-1 rounded-full ${i < filled ? 'bg-yellow-400' : 'bg-zinc-800'}`;
                els.deckProgress.appendChild(dot);
            }
            if (o.deck.length === 0) els.btnPull.disabled = true;
            else els.btnPull.disabled = false;
        }

        function showSpinningUI() {
            els.cardIdle.classList.add('hidden');
            els.cardResult.classList.add('hidden');
            els.cardSpinning.classList.remove('hidden');
            els.resultOverlay.classList.add('opacity-0');
        }

        function showResultUI(card, newDeck) {
            const o = oripas.find(item => item.id === currentOripaId);
            if (o) o.deck = newDeck;
            updateOripaInGame();

            els.cardSpinning.classList.add('hidden');
            els.cardResult.classList.remove('hidden');
            
            const videoSrc = card.win ? '1.mp4' : '2.mp4';
            
            if (card.win) {
                els.cardAura.className = "absolute -inset-6 rounded-[3rem] blur-3xl transition-all duration-1000 bg-yellow-400 opacity-60 animate-pulse";
                els.resultText.innerText = "WIN!!"; els.resultText.className = "text-4xl font-black italic tracking-tighter uppercase mb-2 text-yellow-400";
            } else {
                els.cardAura.className = "absolute -inset-6 rounded-[3rem] blur-3xl transition-all duration-1000 bg-red-600 opacity-20";
                els.resultText.innerText = "LOSE"; els.resultText.className = "text-4xl font-black italic tracking-tighter uppercase mb-2 text-zinc-400";
            }

            els.resultVideo.src = videoSrc;
            els.resultVideo.play().catch(e => console.log("Video fail", e));
            els.resultVideo.onended = () => {
                els.resultOverlay.classList.remove('opacity-0');
            };
        }

        // --- Interaction ---

        document.getElementById('btn-add-oripa').onclick = () => {
            const win = parseInt(document.getElementById('input-win-count').value) || 0;
            const lose = parseInt(document.getElementById('input-lose-count').value) || 0;
            const title = document.getElementById('input-title').value || '無題のオリパ';
            
            if (win + lose === 0) return alert('1口以上作成してください');

            let newDeck = [];
            for(let i=0; i<win; i++) newDeck.push({ win: true });
            for(let i=0; i<lose; i++) newDeck.push({ win: false });
            for (let i = newDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newDeck[i], newDeck[j]] = [newDeck[j], newDeck[i]];
            }

            const newOripa = {
                id: crypto.randomUUID(),
                title: title,
                imageData: document.getElementById('image-label').dataset.src || '',
                deck: newDeck,
                total: win + lose
            };

            oripas.push(newOripa);
            sendData({ type: 'SYNC_LIST', oripas });
            showListView();
            
            // Reset input
            document.getElementById('input-title').value = '';
            els.imageLabel.innerText = '画像を選択';
            delete els.imageLabel.dataset.src;
        };

        els.btnPull.onclick = () => {
            if (role !== 'guest' || !currentOripaId) return;
            const o = oripas.find(item => item.id === currentOripaId);
            if (!o || o.deck.length === 0) return;

            showSpinningUI();
            sendData({ type: 'START_SPIN', oripaId: currentOripaId });

            setTimeout(() => {
                const card = o.deck.pop();
                showResultUI(card, o.deck);
                sendData({ type: 'RESULT', oripaId: currentOripaId, card, newDeck: o.deck });
                // ホストへ状態を強制同期
                sendData({ type: 'SYNC_LIST', oripas });
            }, 2000);
        };

        els.btnReset.onclick = () => {
            if (confirm('このオリパを削除しますか？')) {
                const idToRemove = currentOripaId;
                oripas = oripas.filter(o => o.id !== idToRemove);
                sendData({ type: 'ORIPA_REMOVED', oripaId: idToRemove });
                showListView();
            }
        };

        els.btnLeaveGame.onclick = () => showListView();
        els.btnShowList.onclick = () => showListView();
        els.btnBackSetup.onclick = () => {
            els.oripaListView.classList.add('hidden');
            els.setupView.classList.remove('hidden');
        };

        els.inputImage.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                els.imageLabel.innerText = '画像を選択済み';
                els.imageLabel.dataset.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        document.getElementById('btn-share').onclick = () => {
            const url = `${window.location.origin}${window.location.pathname}?host=${myId}`;
            const t = document.createElement("textarea"); t.value = url; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
            const toast = document.getElementById('toast'); toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        };

        document.getElementById('btn-settings').onclick = () => document.getElementById('settings-overlay').classList.remove('hidden');
        document.getElementById('btn-close-settings').onclick = () => document.getElementById('settings-overlay').classList.add('hidden');

        initPeer();
    </script>
</body>
</html>
