<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POKÉ-ORIPA REALTIME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #0a0a0c;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes scan {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(100%); opacity: 0; }
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 350px;
            background: #000;
            overflow: hidden;
            border-radius: 1.5rem;
        }

        .scanning-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #60a5fa;
            box-shadow: 0 0 15px #60a5fa;
            animation: scan 2s linear infinite;
        }

        .page-fade {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="pb-24">

    <!-- ヘッダー -->
    <header class="sticky top-0 z-50 glass-panel border-b border-white/5 p-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-red-600 p-2 rounded-lg shadow-lg">
                    <i class="fas fa-bolt text-white"></i>
                </div>
                <h1 class="font-black text-xl italic tracking-tighter">POKÉ-ORIPA</h1>
            </div>
            <div class="flex items-center bg-black/40 px-3 py-1.5 rounded-full border border-yellow-500/30">
                <i class="fas fa-coins text-yellow-400 mr-2"></i>
                <span id="point-display" class="font-mono font-bold text-yellow-400">---</span>
            </div>
        </div>
    </header>

    <main id="main-content" class="max-w-md mx-auto p-4 space-y-6">
        <div class="text-center py-20">
            <i class="fas fa-circle-notch fa-spin text-3xl text-red-500 mb-4"></i>
            <p>サーバーに接続中...</p>
        </div>
    </main>

    <!-- ガチャ演出オーバーレイ -->
    <div id="gacha-overlay" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black">
        <div class="w-full max-w-md p-6 text-center">
            <div class="video-container flex items-center justify-center relative bg-slate-900 border-4 border-slate-800">
                <div id="video-bg" class="absolute inset-0 bg-gradient-to-b from-blue-900/20 to-black"></div>
                <div class="scanning-line"></div>
                <div id="pack-visual" class="relative z-10 transition-all duration-1000">
                    <div class="w-32 h-48 bg-gradient-to-br from-red-500 to-blue-600 rounded-lg shadow-2xl flex items-center justify-center border-2 border-white/20">
                        <i class="fas fa-question text-4xl text-white animate-pulse"></i>
                    </div>
                </div>
            </div>
            <h2 id="gacha-status" class="mt-8 text-xl font-bold tracking-widest text-blue-400 animate-pulse uppercase">
                Synchronizing...
            </h2>
        </div>
    </div>

    <!-- 結果表示モーダル -->
    <div id="result-modal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-6 bg-black/95 backdrop-blur-md">
        <div class="w-full max-w-sm glass-panel rounded-[2.5rem] p-8 border border-white/10 shadow-2xl scale-90 opacity-0 transition-all duration-500" id="modal-body">
            <div class="text-center mb-6">
                <span class="text-yellow-500 text-xs font-black tracking-widest uppercase">Target Captured!</span>
                <h3 id="result-name" class="text-2xl font-black mt-1">ポケモン名</h3>
            </div>
            <div id="result-card-container" class="relative group mx-auto mb-8 text-center">
                <div id="result-card-bg" class="aspect-square w-56 mx-auto rounded-full flex items-center justify-center relative overflow-hidden shadow-2xl border-4 border-white/10">
                    <img id="result-img" src="" alt="" class="w-40 h-40 object-contain z-10 drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]">
                </div>
                <div id="result-rarity" class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-white text-slate-900 font-black px-6 py-1 rounded-full text-sm shadow-xl">
                    RANK
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="handleRecycle()" class="flex flex-col items-center gap-1 bg-slate-800/80 border border-slate-700 py-4 rounded-2xl hover:bg-slate-700 transition-colors">
                    <i class="fas fa-undo text-yellow-400"></i>
                    <span class="text-[10px] font-bold text-slate-400">ポイント還元</span>
                    <span id="recycle-value" class="text-yellow-400 font-mono text-xs">---</span>
                </button>
                <button onclick="handleKeep()" class="flex flex-col items-center gap-1 bg-gradient-to-br from-red-600 to-orange-600 py-4 rounded-2xl hover:brightness-110 shadow-lg shadow-red-900/40">
                    <i class="fas fa-box-open text-white"></i>
                    <span class="text-[10px] font-bold text-white">手持ちに加える</span>
                    <span class="text-red-100 text-[10px]">コレクションへ</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ナビゲーション -->
    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900/90 backdrop-blur-lg border-t border-slate-800 p-2 z-50">
        <div class="max-w-md mx-auto flex justify-around">
            <button onclick="switchPage('home')" id="nav-home" class="flex flex-col items-center p-2 gap-1 text-red-500">
                <i class="fas fa-gamepad text-xl"></i>
                <span class="text-[10px] font-bold">ガチャ</span>
            </button>
            <button onclick="switchPage('collection')" id="nav-collection" class="flex flex-col items-center p-2 gap-1 text-slate-500">
                <i class="fas fa-book text-xl"></i>
                <span class="text-[10px] font-bold">図鑑</span>
            </button>
        </div>
    </nav>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, increment, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // --- Firebase 設定 ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-oripa';

        // --- ゲーム定数 ---
        const GACHA_COST = 500;
        const INITIAL_STOCK = 100;
        const RARITIES = {
            S: { label: 'S RANK', color: 'from-amber-400 to-red-600', recycle: 2500, range: [1, 151] },
            A: { label: 'A RANK', color: 'from-purple-500 to-indigo-600', recycle: 800, range: [1, 400] },
            B: { label: 'B RANK', color: 'from-blue-400 to-blue-600', recycle: 200, range: [1, 800] },
            C: { label: 'C RANK', color: 'from-slate-400 to-slate-500', recycle: 50, range: [1, 1010] }
        };

        // --- ローカル状態 ---
        let user = null;
        let userData = { points: 10000, collection: [] };
        let globalStock = 0;
        let currentPage = 'home';
        let currentCard = null;

        // --- パスヘルパー (RULE 1 準拠) ---
        // 公開データ用: /artifacts/{appId}/public/data/{collectionName}/{docId}
        const getPublicDoc = (collectionName, docId) => doc(db, 'artifacts', appId, 'public', 'data', collectionName, docId);
        // ユーザー用: /artifacts/{appId}/users/{userId}/{collectionName}/{docId}
        const getUserDoc = (userId, collectionName, docId) => doc(db, 'artifacts', appId, 'users', userId, collectionName, docId);

        // --- 初期化フロー ---
        async function init() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                
                onAuthStateChanged(auth, (u) => {
                    if (u) {
                        user = u;
                        setupRealtimeListeners();
                    }
                });
            } catch (err) {
                console.error("Auth Error:", err);
            }
        }

        function setupRealtimeListeners() {
            if (!user) return;

            // 1. 公開在庫の監視 (セグメント数を偶数にするために 'global' コレクション内の 'inventory' ドキュメントを参照)
            const stockDoc = getPublicDoc('global', 'inventory');
            
            onSnapshot(stockDoc, async (snapshot) => {
                if (!snapshot.exists()) {
                    await setDoc(stockDoc, { remaining: INITIAL_STOCK });
                    globalStock = INITIAL_STOCK;
                } else {
                    globalStock = snapshot.data().remaining;
                }
                renderPage();
            }, (error) => console.error("Stock error:", error));

            // 2. ユーザー個別データの監視
            const profileDoc = getUserDoc(user.uid, 'profile', 'main');
            onSnapshot(profileDoc, (snapshot) => {
                if (!snapshot.exists()) {
                    setDoc(profileDoc, userData);
                } else {
                    userData = snapshot.data();
                    updateUI();
                    renderPage();
                }
            }, (error) => console.error("User data error:", error));
        }

        function updateUI() {
            const el = document.getElementById('point-display');
            if (el) el.innerText = (userData.points || 0).toLocaleString();
        }

        // --- ガチャロジック ---
        window.startGacha = async () => {
            if (!user) return;
            if (userData.points < GACHA_COST) return alert("ポイント不足です！");
            if (globalStock <= 0) return alert("完売しました！");

            const overlay = document.getElementById('gacha-overlay');
            overlay.classList.remove('hidden');

            try {
                // 1. 在庫を減らす (Atomic update)
                const stockDoc = getPublicDoc('global', 'inventory');
                await updateDoc(stockDoc, { remaining: increment(-1) });

                // 2. ポイントを消費
                const profileDoc = getUserDoc(user.uid, 'profile', 'main');
                await updateDoc(profileDoc, { points: increment(-GACHA_COST) });

                // 3. ポケモン決定
                const rarityKey = getRandRarityKey();
                const r = RARITIES[rarityKey];
                const pokeId = Math.floor(Math.random() * (r.range[1] - r.range[0] + 1)) + r.range[0];
                
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${pokeId}`);
                const data = await response.json();
                
                currentCard = {
                    id: data.id,
                    name: data.name.toUpperCase(),
                    img: data.sprites.other['official-artwork'].front_default || data.sprites.front_default,
                    rarity: rarityKey,
                    timestamp: Date.now()
                };

                setTimeout(() => {
                    overlay.classList.add('hidden');
                    showResultModal();
                }, 2000);

            } catch (err) {
                console.error(err);
                overlay.classList.add('hidden');
                alert("通信エラーが発生しました。");
            }
        };

        function getRandRarityKey() {
            const n = Math.random() * 100;
            if (n < 5) return 'S';
            if (n < 20) return 'A';
            if (n < 50) return 'B';
            return 'C';
        }

        function showResultModal() {
            const modal = document.getElementById('result-modal');
            const body = document.getElementById('modal-body');
            const r = RARITIES[currentCard.rarity];

            document.getElementById('result-name').innerText = currentCard.name;
            document.getElementById('result-img').src = currentCard.img;
            document.getElementById('result-rarity').innerText = r.label;
            document.getElementById('result-card-bg').className = `aspect-square w-52 mx-auto rounded-full flex items-center justify-center relative overflow-hidden shadow-2xl border-4 border-white/10 bg-gradient-to-br ${r.color}`;
            document.getElementById('recycle-value').innerText = `${r.recycle} PT`;

            modal.classList.remove('hidden');
            setTimeout(() => body.classList.remove('scale-90', 'opacity-0'), 10);
        }

        window.handleRecycle = async () => {
            if (!user || !currentCard) return;
            const r = RARITIES[currentCard.rarity];
            const profileDoc = getUserDoc(user.uid, 'profile', 'main');
            await updateDoc(profileDoc, { points: increment(r.recycle) });
            closeModal();
        };

        window.handleKeep = async () => {
            if (!user || !currentCard) return;
            const profileDoc = getUserDoc(user.uid, 'profile', 'main');
            const newCollection = [currentCard, ...(userData.collection || [])];
            await updateDoc(profileDoc, { collection: newCollection });
            closeModal();
        };

        function closeModal() {
            const modal = document.getElementById('result-modal');
            document.getElementById('modal-body').classList.add('scale-90', 'opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        window.switchPage = (p) => {
            currentPage = p;
            renderPage();
        };

        function renderPage() {
            const main = document.getElementById('main-content');
            if (!user) return;

            const homeBtn = document.getElementById('nav-home');
            const collBtn = document.getElementById('nav-collection');
            if (homeBtn) homeBtn.className = `flex flex-col items-center p-2 gap-1 ${currentPage === 'home' ? 'text-red-500' : 'text-slate-500'}`;
            if (collBtn) collBtn.className = `flex flex-col items-center p-2 gap-1 ${currentPage === 'collection' ? 'text-blue-500' : 'text-slate-500'}`;

            if (currentPage === 'home') {
                main.innerHTML = `
                    <div class="page-fade space-y-6">
                        <div class="relative h-44 rounded-3xl overflow-hidden bg-gradient-to-br from-red-600 to-indigo-800 p-6 flex flex-col justify-end border border-white/10">
                            <h2 class="text-3xl font-black italic text-white tracking-tighter">MULTI-LIVE PACK</h2>
                            <p class="text-xs text-white/70">全ユーザー共通の在庫からリアルタイム抽選！</p>
                        </div>

                        <div class="glass-panel rounded-[2rem] p-6 border border-white/10">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="font-bold">伝説確定オリパ</h3>
                                <div class="text-right">
                                    <p class="text-[10px] text-slate-400 font-bold uppercase">Remaining</p>
                                    <p class="text-xl font-black text-yellow-400 font-mono">${globalStock} / ${INITIAL_STOCK}</p>
                                </div>
                            </div>

                            <div class="h-2 w-full bg-black/40 rounded-full overflow-hidden mb-6">
                                <div class="h-full bg-gradient-to-r from-yellow-600 to-yellow-300 transition-all duration-1000" style="width: ${(globalStock/INITIAL_STOCK)*100}%"></div>
                            </div>

                            <div class="video-container flex items-center justify-center bg-slate-900/50 mb-6 cursor-pointer group" onclick="startGacha()">
                                <div class="relative w-24 h-36 bg-gradient-to-br from-red-500/50 to-blue-600/50 rounded-lg border border-white/20 flex items-center justify-center group-hover:scale-105 transition-transform">
                                     <i class="fas fa-signal text-white animate-pulse"></i>
                                </div>
                            </div>

                            <button onclick="startGacha()" class="w-full bg-gradient-to-r from-red-600 to-red-500 py-4 rounded-2xl font-black text-xl shadow-lg hover:brightness-110 active:scale-95 transition-all">
                                ${GACHA_COST.toLocaleString()} PT で引く
                            </button>
                        </div>
                    </div>
                `;
            } else if (currentPage === 'collection') {
                const items = userData.collection || [];
                main.innerHTML = `
                    <div class="page-fade space-y-4">
                        <h2 class="text-xl font-bold flex items-center gap-2"><i class="fas fa-book text-blue-400"></i> あなたの図鑑 (${items.length})</h2>
                        <div class="grid grid-cols-2 gap-3">
                            ${items.length === 0 ? '<p class="col-span-2 text-center py-10 text-slate-500">まだポケモンがいません</p>' : 
                                items.map(item => `
                                <div class="glass-panel rounded-2xl p-3 border border-white/5 flex flex-col items-center">
                                    <div class="w-full aspect-square rounded-xl bg-gradient-to-br ${RARITIES[item.rarity].color} flex items-center justify-center overflow-hidden">
                                        <img src="${item.img}" class="w-20 h-20 object-contain drop-shadow-xl">
                                    </div>
                                    <p class="text-[10px] font-bold mt-2 truncate w-full text-center">${item.name}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
        }

        init();
    </script>
</body>
</html>
