<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORIPA.P2P - オンラインオリパ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #050505;
            color: #ffffff;
            user-select: none;
            overflow: hidden;
        }

        /* 全画面動画オーバーレイ */
        #fullscreen-video-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #fullscreen-video-layer video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .result-card-anim {
            animation: card-pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes card-pop {
            0% { transform: scale(0.5) translateY(100px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .shimmer-text {
            background: linear-gradient(90deg, #fff, #FACC15, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 2s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .toast { transform: translateX(-50%) translateY(100px); transition: transform 0.3s ease; }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="fixed inset-0 flex flex-col">

    <!-- 全画面演出レイヤー (開封時に表示) -->
    <div id="fullscreen-video-layer">
        <video id="main-video" playsinline></video>
        <div id="final-result-overlay" class="absolute inset-0 bg-black/90 flex flex-col items-center justify-center hidden p-6">
            <div id="result-card-container" class="result-card-anim w-full max-w-[320px] aspect-[3/4] rounded-3xl overflow-hidden border-4 border-yellow-400 shadow-[0_0_50px_rgba(250,204,21,0.5)] bg-zinc-900 mb-8">
                <img id="result-card-img" src="" class="w-full h-full object-cover">
                <div id="lose-text-container" class="w-full h-full flex flex-col items-center justify-center bg-zinc-900">
                     <i class="fas fa-times-circle text-zinc-700 text-8xl mb-4"></i>
                     <h2 class="text-4xl font-black text-zinc-500">ハズレ</h2>
                </div>
            </div>
            <h2 id="result-badge" class="text-5xl font-black italic shimmer-text mb-8">WINNER!!</h2>
            <button id="btn-close-result" class="bg-white text-black px-12 py-4 rounded-full font-black text-lg active:scale-95 transition-transform">閉じる</button>
        </div>
    </div>

    <!-- Header -->
    <header class="px-6 py-4 flex justify-between items-center z-20 border-b border-yellow-500/20 bg-black">
        <div class="flex items-center gap-2">
            <div class="bg-yellow-400 p-1 rounded-sm">
                <i class="fas fa-bolt text-black text-lg"></i>
            </div>
            <h1 class="text-xl font-black italic tracking-tighter text-yellow-400">ORIPA.P2P</h1>
        </div>
        <div class="flex gap-2">
            <button id="btn-share" class="hidden bg-yellow-400 text-black px-4 py-1.5 rounded-full text-[11px] font-black flex items-center gap-1">
                <i class="fas fa-share-alt"></i> 招待
            </button>
            <button id="btn-settings" class="hidden p-2 border border-yellow-500/30 rounded-full text-yellow-400">
                <i class="fas fa-cog"></i>
            </button>
        </div>
    </header>

    <!-- Main -->
    <main class="flex-1 relative flex flex-col items-center justify-center p-6 overflow-y-auto pb-32">
        
        <!-- Status Dot (Host Only) -->
        <div id="status-container" class="absolute top-6 flex items-center gap-2 bg-yellow-400/10 border border-yellow-400/20 px-4 py-1.5 rounded-full z-10 hidden">
            <div id="status-dot" class="w-1.5 h-1.5 rounded-full bg-red-500"></div>
            <span id="status-text" class="text-[10px] font-bold uppercase text-yellow-400/80">Connecting...</span>
        </div>

        <!-- Setup View (Host Only) -->
        <div id="setup-view" class="w-full max-w-sm bg-zinc-900/50 border border-yellow-500/20 rounded-3xl p-6 hidden">
            <h2 class="text-lg font-black text-yellow-400 mb-6"><i class="fas fa-plus-circle mr-2"></i>オリパ作成</h2>
            
            <div class="space-y-4">
                <input id="input-title" type="text" placeholder="オリパタイトル" class="w-full bg-black border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:border-yellow-400 outline-none">
                
                <div class="grid grid-cols-2 gap-3">
                    <label class="bg-zinc-800 border border-zinc-700 rounded-xl p-3 text-center cursor-pointer">
                        <span class="text-[10px] font-bold text-zinc-500 block mb-1">サムネイル</span>
                        <i class="fas fa-image text-zinc-400"></i>
                        <input id="input-image" type="file" accept="image/*" class="hidden">
                    </label>
                    <label class="bg-zinc-800 border border-zinc-700 rounded-xl p-3 text-center cursor-pointer border-yellow-500/50">
                        <span class="text-[10px] font-bold text-yellow-500 block mb-1">当たりカード</span>
                        <i class="fas fa-star text-yellow-400"></i>
                        <input id="input-win-image" type="file" accept="image/*" class="hidden">
                    </label>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-black/40 p-3 rounded-xl border border-zinc-800">
                        <label class="text-[10px] font-bold text-zinc-500 block mb-1">当たり数</label>
                        <input id="input-win-count" type="number" value="1" class="w-full bg-transparent font-bold outline-none">
                    </div>
                    <div class="bg-black/40 p-3 rounded-xl border border-zinc-800">
                        <label class="text-[10px] font-bold text-zinc-500 block mb-1">ハズレ数</label>
                        <input id="input-lose-count" type="number" value="9" class="w-full bg-transparent font-bold outline-none">
                    </div>
                </div>
            </div>
            
            <button id="btn-add-oripa" class="w-full bg-yellow-400 text-black font-black py-4 rounded-xl mt-6 shadow-lg shadow-yellow-400/20">公開する</button>
            <button id="btn-show-list" class="w-full mt-4 text-xs font-bold text-zinc-500">公開中のリストを見る</button>
        </div>

        <!-- List View -->
        <div id="oripa-list-view" class="w-full max-w-sm space-y-4 hidden">
            <h2 class="text-xl font-black text-yellow-400 italic mb-4 text-center">公開中のオリパ</h2>
            <div id="oripa-items-container" class="space-y-3"></div>
            <button id="btn-back-to-setup" class="hidden w-full py-3 text-zinc-500 text-xs font-bold border border-zinc-800 rounded-xl">新規作成に戻る</button>
        </div>

        <!-- Game View -->
        <div id="game-view" class="w-full flex flex-col items-center hidden">
            <button id="btn-leave-game" class="mb-4 text-zinc-500 text-xs font-bold"><i class="fas fa-chevron-left mr-1"></i>戻る</button>
            <h2 id="display-title" class="text-2xl font-black text-yellow-400 italic mb-8 uppercase text-center">TITLE</h2>

            <div class="w-full max-w-[280px] aspect-[3/4] relative">
                <div class="absolute -inset-4 bg-yellow-400/20 blur-2xl rounded-full"></div>
                <div id="card-display" class="w-full h-full rounded-[2.5rem] bg-zinc-900 border-2 border-zinc-800 flex flex-col items-center justify-center overflow-hidden relative shadow-2xl">
                    <img id="card-idle-thumb" src="" class="w-full h-full object-cover">
                    <div id="no-thumb-placeholder" class="flex flex-col items-center text-zinc-700">
                        <i class="fas fa-gift text-6xl mb-4"></i>
                        <p class="font-black text-xs tracking-widest uppercase">No Preview</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Controls -->
    <footer id="controls" class="p-6 pb-12 bg-black border-t border-yellow-500/10 hidden">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <p class="text-[10px] font-black text-zinc-600 uppercase mb-1">残り口数</p>
                    <p class="text-2xl font-black"><span id="deck-count">0</span> <span class="text-sm text-zinc-500">/ <span id="total-count">0</span></span></p>
                </div>
                <div id="deck-progress" class="flex gap-1"></div>
            </div>

            <button id="btn-pull" class="w-full bg-yellow-400 text-black rounded-2xl font-black text-xl py-5 shadow-xl shadow-yellow-400/20 disabled:opacity-20 active:scale-95 transition-transform">
                <i class="fas fa-bolt mr-2"></i>開封する
            </button>
            <button id="btn-reset" class="hidden w-full bg-red-600/10 text-red-500 border border-red-500/20 rounded-2xl py-3 font-bold text-xs mt-4">削除する</button>
        </div>
    </footer>

    <!-- Settings (Host Only) -->
    <div id="settings-overlay" class="fixed inset-0 z-50 bg-black/95 hidden flex flex-col">
        <div class="flex justify-between items-center p-6 border-b border-white/5">
            <h2 class="text-xl font-black text-yellow-400 italic">SETTINGS</h2>
            <button id="btn-close-settings" class="p-2 bg-zinc-900 rounded-full"><i class="fas fa-times"></i></button>
        </div>
        <div class="p-6">
            <label class="text-[10px] font-black text-zinc-600 uppercase mb-3 block">My Peer ID</label>
            <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-2xl">
                <span id="my-id-display" class="text-xs font-mono text-yellow-400 break-all select-all">---</span>
            </div>
        </div>
    </div>

    <div id="toast" class="toast fixed bottom-10 left-1/2 bg-yellow-400 text-black px-8 py-3 rounded-full font-black text-sm z-[100]">コピーしました</div>

    <script>
        let peer, conn, connections = [], oripas = [], role = null, currentOripaId = null;

        const els = {
            statusContainer: document.getElementById('status-container'),
            statusText: document.getElementById('status-text'),
            statusDot: document.getElementById('status-dot'),
            setupView: document.getElementById('setup-view'),
            oripaListView: document.getElementById('oripa-list-view'),
            oripaContainer: document.getElementById('oripa-items-container'),
            gameView: document.getElementById('game-view'),
            controls: document.getElementById('controls'),
            btnPull: document.getElementById('btn-pull'),
            btnReset: document.getElementById('btn-reset'),
            btnShowList: document.getElementById('btn-show-list'),
            btnBackSetup: document.getElementById('btn-back-to-setup'),
            btnLeaveGame: document.getElementById('btn-leave-game'),
            deckCount: document.getElementById('deck-count'),
            totalCount: document.getElementById('total-count'),
            deckProgress: document.getElementById('deck-progress'),
            displayTitle: document.getElementById('display-title'),
            cardIdleThumb: document.getElementById('card-idle-thumb'),
            noThumb: document.getElementById('no-thumb-placeholder'),
            fsLayer: document.getElementById('fullscreen-video-layer'),
            mainVideo: document.getElementById('main-video'),
            resultOverlay: document.getElementById('final-result-overlay'),
            resultCardImg: document.getElementById('result-card-img'),
            loseContainer: document.getElementById('lose-text-container'),
            resultBadge: document.getElementById('result-badge'),
            btnCloseResult: document.getElementById('btn-close-result'),
            inputImage: document.getElementById('input-image'),
            inputWinImage: document.getElementById('input-win-image'),
            myIdDisplay: document.getElementById('my-id-display'),
            btnShare: document.getElementById('btn-share'),
            btnSettings: document.getElementById('btn-settings')
        };

        const thumbs = { main: '', win: '' };

        function initPeer() {
            peer = new Peer();
            peer.on('open', (id) => {
                els.myIdDisplay.innerText = id;
                const hostId = new URLSearchParams(window.location.search).get('host');
                if (hostId && hostId !== id) {
                    connectToHost(hostId);
                } else {
                    role = 'host';
                    els.setupView.classList.remove('hidden');
                    els.btnBackSetup.classList.remove('hidden');
                    els.btnShare.classList.remove('hidden');
                    els.btnSettings.classList.remove('hidden');
                    els.statusContainer.classList.remove('hidden');
                }
            });
            peer.on('connection', (c) => {
                role = 'host';
                connections.push(c);
                setupConnection(c);
                setTimeout(() => broadcast({ type: 'SYNC_LIST', oripas }), 1000);
            });
        }

        function connectToHost(id) {
            role = 'guest';
            // ゲストの場合は設定ボタンとステータス表示を徹底的に隠す
            els.btnShare.classList.add('hidden');
            els.btnSettings.classList.add('hidden');
            els.statusContainer.classList.add('hidden');
            conn = peer.connect(id);
            setupConnection(conn);
        }

        function setupConnection(c) {
            c.on('open', () => {
                if (role === 'host') {
                    els.statusDot.className = 'w-1.5 h-1.5 rounded-full bg-green-500';
                    els.statusText.innerText = 'Online';
                }
                if(role === 'guest') sendData({ type: 'REQUEST_SYNC' });
            });
            c.on('data', (data) => {
                switch(data.type) {
                    case 'REQUEST_SYNC':
                        if(role === 'host') broadcast({ type: 'SYNC_LIST', oripas });
                        break;
                    case 'SYNC_LIST':
                        oripas = data.oripas;
                        if (!currentOripaId) showListView(); else updateOripaInGame();
                        break;
                    case 'RESULT':
                        if(role === 'host') {
                            const o = oripas.find(item => item.id === data.oripaId);
                            if(o) {
                                o.deck = data.newDeck;
                                broadcast({ type: 'SYNC_LIST', oripas });
                                updateOripaInGame();
                            }
                        }
                        break;
                    case 'ORIPA_REMOVED':
                        oripas = oripas.filter(o => o.id !== data.oripaId);
                        if(currentOripaId === data.oripaId) { 
                            alert('このオリパは終了しました'); 
                            showListView(); 
                        } else {
                            renderOripaList();
                        }
                        break;
                }
            });
        }

        function sendData(d) { if (conn && conn.open) conn.send(d); }
        function broadcast(d) { connections.forEach(c => { if(c.open) c.send(d); }); }

        function showListView() {
            currentOripaId = null;
            els.setupView.classList.add('hidden');
            els.gameView.classList.add('hidden');
            els.controls.classList.add('hidden');
            els.oripaListView.classList.remove('hidden');
            renderOripaList();
        }

        function renderOripaList() {
            els.oripaContainer.innerHTML = '';
            if (oripas.length === 0) {
                els.oripaContainer.innerHTML = '<p class="text-zinc-600 text-center py-10 italic">公開中のオリパはありません</p>';
                return;
            }
            oripas.forEach(o => {
                const item = document.createElement('div');
                item.className = "bg-zinc-900 border border-zinc-800 p-4 rounded-2xl flex items-center gap-4 active:scale-95 transition-transform cursor-pointer";
                item.innerHTML = `
                    <div class="w-16 h-16 bg-zinc-800 rounded-xl overflow-hidden flex-shrink-0">
                        ${o.imageData ? `<img src="${o.imageData}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-zinc-600"><i class="fas fa-gift"></i></div>`}
                    </div>
                    <div class="flex-1">
                        <h3 class="font-black text-white truncate">${o.title}</h3>
                        <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">残り ${o.deck.length} / ${o.total}</p>
                    </div>
                `;
                item.onclick = () => enterGame(o.id);
                els.oripaContainer.appendChild(item);
            });
        }

        function enterGame(id) {
            currentOripaId = id;
            updateOripaInGame();
            els.oripaListView.classList.add('hidden');
            els.gameView.classList.remove('hidden');
            els.controls.classList.remove('hidden');
            els.btnPull.classList.toggle('hidden', role === 'host');
            els.btnReset.classList.toggle('hidden', role !== 'host');
        }

        function updateOripaInGame() {
            const o = oripas.find(item => item.id === currentOripaId);
            if (!o) return;
            els.displayTitle.innerText = o.title;
            if (o.imageData) {
                els.cardIdleThumb.src = o.imageData;
                els.cardIdleThumb.classList.remove('hidden');
                els.noThumb.classList.add('hidden');
            } else {
                els.cardIdleThumb.classList.add('hidden');
                els.noThumb.classList.remove('hidden');
            }
            els.deckCount.innerText = o.deck.length;
            els.totalCount.innerText = o.total;
            els.btnPull.disabled = o.deck.length === 0;
            
            els.deckProgress.innerHTML = '';
            const maxDots = 5;
            const filled = Math.ceil((o.deck.length / o.total) * maxDots);
            for(let i=0; i<maxDots; i++) {
                const dot = document.createElement('div');
                dot.className = `w-8 h-1 rounded-full ${i < filled ? 'bg-yellow-400' : 'bg-zinc-800'}`;
                els.deckProgress.appendChild(dot);
            }
        }

        els.btnPull.onclick = () => {
            const o = oripas.find(item => item.id === currentOripaId);
            if (!o || o.deck.length === 0) return;

            els.btnPull.disabled = true;
            const card = o.deck.pop();
            
            els.mainVideo.src = card.win ? '1.mp4' : '2.mp4';
            els.mainVideo.volume = 1.0; 
            els.mainVideo.muted = false; 
            
            els.fsLayer.style.display = 'flex';
            els.resultOverlay.classList.add('hidden');
            
            const playPromise = els.mainVideo.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    els.mainVideo.muted = true;
                    els.mainVideo.play();
                });
            }

            els.mainVideo.onended = () => {
                els.resultOverlay.classList.remove('hidden');
                if (card.win) {
                    els.resultBadge.innerText = "WINNER!!";
                    els.resultBadge.className = "text-5xl font-black italic shimmer-text mb-8";
                    if (o.winImageData) {
                        els.resultCardImg.src = o.winImageData;
                        els.resultCardImg.classList.remove('hidden');
                        els.loseContainer.classList.add('hidden');
                    }
                } else {
                    els.resultBadge.innerText = "LOSE...";
                    els.resultBadge.className = "text-5xl font-black italic text-zinc-600 mb-8";
                    els.resultCardImg.classList.add('hidden');
                    els.loseContainer.classList.remove('hidden');
                }
                
                if (role === 'guest') {
                    sendData({ type: 'RESULT', oripaId: currentOripaId, newDeck: o.deck });
                } else {
                    broadcast({ type: 'SYNC_LIST', oripas });
                }
                updateOripaInGame();
            };
        };

        els.btnCloseResult.onclick = () => {
            els.fsLayer.style.display = 'none';
            els.mainVideo.pause();
            els.mainVideo.currentTime = 0;
            const o = oripas.find(o => o.id === currentOripaId);
            els.btnPull.disabled = (!o || o.deck.length === 0);
        };

        document.getElementById('btn-add-oripa').onclick = () => {
            const win = parseInt(document.getElementById('input-win-count').value) || 0;
            const lose = parseInt(document.getElementById('input-lose-count').value) || 0;
            if (win + lose === 0) return alert('1口以上作成してください');

            let newDeck = [];
            for(let i=0; i<win; i++) newDeck.push({ win: true });
            for(let i=0; i<lose; i++) newDeck.push({ win: false });
            newDeck.sort(() => Math.random() - 0.5);

            const newOripa = {
                id: crypto.randomUUID(),
                title: document.getElementById('input-title').value || '無題のオリパ',
                imageData: thumbs.main,
                winImageData: thumbs.win,
                deck: newDeck,
                total: win + lose
            };

            oripas.push(newOripa);
            broadcast({ type: 'SYNC_LIST', oripas });
            showListView();
            
            document.getElementById('input-title').value = '';
            thumbs.main = '';
            thumbs.win = '';
        };

        els.btnReset.onclick = () => {
            if (confirm('削除しますか？')) {
                const id = currentOripaId;
                oripas = oripas.filter(o => o.id !== id);
                broadcast({ type: 'ORIPA_REMOVED', oripaId: id });
                showListView();
            }
        };

        els.inputImage.onchange = (e) => handleFile(e, 'main');
        els.inputWinImage.onchange = (e) => handleFile(e, 'win');
        function handleFile(e, key) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => thumbs[key] = ev.target.result;
            reader.readAsDataURL(file);
        }

        els.btnLeaveGame.onclick = () => showListView();
        els.btnShowList.onclick = () => showListView();
        els.btnBackSetup.onclick = () => { els.oripaListView.classList.add('hidden'); els.setupView.classList.remove('hidden'); };
        
        els.btnShare.onclick = () => {
            const url = `${window.location.origin}${window.location.pathname}?host=${peer.id}`;
            const t = document.createElement("textarea"); 
            t.value = url; 
            document.body.appendChild(t); 
            t.select(); 
            document.execCommand('copy'); 
            document.body.removeChild(t);
            const toast = document.getElementById('toast'); 
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        };
        
        els.btnSettings.onclick = () => document.getElementById('settings-overlay').classList.remove('hidden');
        document.getElementById('btn-close-settings').onclick = () => document.getElementById('settings-overlay').classList.add('hidden');

        initPeer();
    </script>
</body>
</html>
